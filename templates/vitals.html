        <!DOCTYPE html>
        <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Vitals - {{patient[1]}}</title>
        </head>
        <body>
            <h1>Vitals - {{ patient[1] }}</h1>
            <a href="/patient/{{ patient[0] }}">Back</a>

            <hr>
            {% if vitals %}
                <table border="1" cellpadding="8">
                    <tr>
                        <th>Date</th>
                        <th>Temp (°C)</th>
                        <th>BP</th> 
                        <th>Sugar</th>
                        <th>Weight</th>
                        <th>Heart Rate</th>

                    </tr>
                    {% for v in vitals %}

                    <tr>
                        <td>{{ v[2] }}</td>
                        <td>{{ v[3] }}</td>
                        <td>{{ v[4] }}/{{ v[5] }}</td>
                        <td>{{ v[6] }}</td>
                        <td>{{ v[7] }}</td>
                        <td>{{ v[8] }}</td>
                    </tr>
                    {% endfor %}
                </table>
            {% else %}
                <p>No vitals logged yet.</p>
            {% endif %}
        </body>
        </html>
