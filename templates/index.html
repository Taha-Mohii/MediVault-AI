<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediVault</title>
</head>
<body>
    <h1>🏥 MediVault</h1>
    <a href="/add"> + Add New Patient </a>

    <hr>
    {% if patients %}
        {% for p in patients %}
            <div>
                <h3>{{ p[1] }}</h3>
                <p>Age: {{ p[2] }} | Condition : {{ p[3] }}</p>
                <P>Doctor: {{ p[4] }} | Hospital: {{ p[5] }}</P>

                <a href="/patient/{{ p[0] }}">View</a>
                <a href="/delete/{{ p[0] }}">Delete</a>
            </div>
            <hr>
        {% endfor %}
    {% else %}
            <p>No patients added yet.</p>
    {% endif %}
</body>
</html>
