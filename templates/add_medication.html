<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
    <title>Add Medication</title>
</head>
<body>
<div class="container">

    <a href="/patient/{{ patient_id }}/medications" class="back-link">← Back to Medications</a>

    <h1>💊 Add Medication</h1>
    <p>Add a new medication to the patient's prescription list.</p>

    <hr>

    <div class="card">
        <form method="POST">
            <label>Medication Name</label>
            <input type="text" name="name" placeholder="e.g. Paracetamol" required>

            <label>Dose</label>
            <input type="text" name="dose" placeholder="e.g. 500mg" required>

            <label>Frequency</label>
            <select name="frequency">
                <option value="Once daily">Once daily</option>
                <option value="Twice daily">Twice daily</option>
                <option value="Three times daily">Three times daily</option>
                <option value="As needed">As needed</option>
            </select>

            <label>Timing</label>
            <select name="timing">
                <option value="Before food">Before food</option>
                <option value="After food">After food</option>
                <option value="With food">With food</option>
                <option value="At bedtime">At bedtime</option>
            </select>

            <button type="submit" class="btn btn-green">Save Medication</button>
        </form>
    </div>

</div>
</body>
</html>
